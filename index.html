            <script>
  // List of sections to load
  const sections = [
    { id: 'Home',    file: 'home.html'      },
    { id: 'Search',  file: 'search.html'    },
    { id: 'library', file: 'library.html'   },
    { id: 'Liked',   file: 'likedsong.html' },
  ];

  sections.forEach(({ id, file }) => {
    fetch(file)
      .then(res => res.text())
      .then(html => {
        // Parse the fetched HTML and extract only the <body> content
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        document.getElementById(id).innerHTML = doc.body.innerHTML;
      });
  });
</script>
