<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Section</title>
    <link rel="stylesheet" href="./bootstrap5.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div id="Search" class="container text-white ">
    <i class="fa-solid fa-magnifying-glass-minus"></i>

</button>
<button class="btn btn-dark rounded-circle me-3" style="width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center;">
    <i class="fas fa-chevron-right" style="font-size: 14px;"></i>
</button>
    <input type="text"
           class="search-box mb-4"

    <h2 class="fw-bold text-white mb-4">Browse All</h2>

    <div class="row g-4">

        <div class="col-md-3">
