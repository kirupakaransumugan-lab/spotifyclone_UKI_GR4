<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liked Song Section</title>
    <link rel="stylesheet" href="./bootstrap5.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="Liked" class="py-4 px-4">

    <h2 class="text-white fw-bold mb-4">Liked Songs</h2>

    <div class="table-responsive">

        <table class="table table-dark align-middle song-table">

            <thead>
                <tr class="text-secondary">
                    <th style="width:60px;">NO</th>
                    <th>Title</th>
                    <th>Album</th> 
                      <th class="text-end">Time</th>
                        <i class="bi bi-clock"></i>
                    </th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>1</td>

                    <td>
                        <div class="d-flex align-items-center">

                            <img src="./assets/likes song1.jpg"
                                class="song-img me-3">

                            <div>
                                <h6 class="mb-0 text-white">
                                    Hiphop Rap
                                </h6>

                                <small class="text-secondary">
                                    Hiphop Aadhi
                                </small>
                            </div>

                        </div>
                    </td>

                    <td>Single Pasanga</td>

                    <td class="text-end">
                        0:56
                    </td>

                </tr>

                <tr>

                    <td>2</td>

                    <td>

                        <div class="d-flex align-items-center">

                            <img src="./assets/likes song2.jpg"
                                class="song-img me-3">

                            <div>

                                <h6 class="mb-0 text-white">
                                    Folk Songs
                                </h6>

                                <small class="text-secondary">
                                    Chinmayi
                                </small>

                            </div>

                        </div>

                    </td>

                    <td>Adi Aathi</td>

                    <td class="text-end">
                        1:26
                    </td>

                </tr>

                <tr>

                    <td>3</td>

                    <td>

                        <div class="d-flex align-items-center">

                            <img src="./assets/download.jpg"
                                class="song-img me-3">

                            <div>

                                <h6 class="mb-0 text-white">
                                    Melodies
                                </h6>

                                <small class="text-secondary">
                                    Pradeep Kumar
                                </small>

                            </div>

                        </div>

                    </td>

                    <td>Nee Kavithaigalaa</td>

                    <td class="text-end">
                        3:06
                    </td>

                </tr>

                <tr>

                    <td>4</td>

                    <td>

                        <div class="d-flex align-items-center">

                            <img src="./assets/likes song 3.jpg"
                                class="song-img me-3">

                            <div>

                                <h6 class="mb-0 text-white">
                                    Love Songs
                                </h6>

                                <small class="text-secondary">
                                    Shwetha Mohan
                                </small>

                            </div>

                        </div>

                    </td>

                    <td>Nee Paartha Vizhigal</td>

                    <td class="text-end">
                        2:16
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
