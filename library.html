<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./style.css">
        <link rel="stylesheet" href="./bootstrap5.3/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    </head>
    <body>
      
        <section id="library">
            <div class="container-fluid">
            <div class="row">
                    
                  <main class="col-12 library-page p-4">

                    <!--  your library Heading -->

            <div class="d-flex justify-content-between align-items-center">

                <h3 class="fw-bold text-white">Your Library</h3>
                   <button class="btn search-btn rounded-circle"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>  

             <!-- Filter Buttons -->

            <div class="mt-4 d-flex gap-2 flex-wrap">

                 <button class="btn filter-btn active-filter">
                    All
                </button>

                <button class="btn filter-btn">
                    Playlists
                </button>

                <button class="btn filter-btn">
                    Albums
                </button>

                <button class="btn filter-btn">
                    Artists
                </button>

            </div>

            <!-- Recents -->

            <div class="d-flex justify-content-between align-items-center mt-4">

                <span class="text-secondary">
                    Recents
                    <i class="fa-solid fa-angle-down"></i>
                </span>

                <!-- Liked Icon -->

                <button class="btn liked-btn rounded-circle">

                    <i class="fa-solid fa-heart"></i>

                </button>

            </div>





                  </main>


            </div>
            </div>












        </section>
        
      
     
        <script src="./bootstrap5.3/js/bootstrap.bundle.min.js" async defer></script>
    </body>
</html>
